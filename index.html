<!doctype html>
<html lang="en" class="bg-[#050505] text-[#e5e5e5] scroll-smooth">

    <div class="pointer-events-none fixed inset-0 z-50 h-full w-full opacity-[0.025] mix-blend-overlay">

        </filter>
        <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
      </svg>
    </div>
    
    <div id="root"></div>
